<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle pattern -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="rgba(255,255,255,0.05)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Main content -->
  <g transform="translate(100, 180)">
    <!-- Journal badge -->
    <rect x="0" y="0" width="200" height="60" rx="8" fill="#10b981" opacity="0.9"/>
    <text x="100" y="38" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">
      JAIGP
    </text>

    <!-- Document icon/illustration -->
    <g transform="translate(850, -30)">
      <rect x="0" y="0" width="200" height="280" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
      <rect x="30" y="40" width="140" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
      <rect x="30" y="70" width="140" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
      <rect x="30" y="100" width="100" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>

      <rect x="30" y="140" width="140" height="8" rx="4" fill="rgba(16,185,129,0.3)"/>
      <rect x="30" y="165" width="140" height="8" rx="4" fill="rgba(16,185,129,0.3)"/>
      <rect x="30" y="190" width="90" height="8" rx="4" fill="rgba(16,185,129,0.3)"/>
    </g>

    <!-- Main text -->
    <text x="0" y="130" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1">
      AI-Generated
    </text>
    <text x="0" y="195" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1">
      Research Paper
    </text>

    <!-- Subtitle -->
    <text x="0" y="255" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.75)">
      Published in the Journal of AI Generated Papers
    </text>

  </g>

  <!-- Bottom accent -->
  <rect x="0" y="624" width="1200" height="6" fill="#10b981"/>

</svg>
