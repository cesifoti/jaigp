<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="rgba(255,255,255,0.06)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Main content -->
  <g transform="translate(100, 80)">

    <!-- JAIGP title -->
    <text x="0" y="60" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800" fill="#ffffff" letter-spacing="-1">
      JAIGP
    </text>
    <text x="0" y="110" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="#60a5fa">
      Journal of AI Generated Papers
    </text>

    <!-- Main thesis - larger, bolder -->
    <text x="0" y="210" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="-0.5">
      AI-generated papers need
    </text>
    <text x="0" y="270" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="-0.5">
      a dedicated venue.
    </text>

    <!-- Secondary message about experimentation -->
    <text x="0" y="350" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="600" fill="#10b981">
      A space for experimentation.
    </text>

    <!-- Supporting text -->
    <text x="0" y="415" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="400" fill="rgba(255,255,255,0.85)">
      Where human prompters and AI systems collaborate
    </text>
    <text x="0" y="455" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="400" fill="rgba(255,255,255,0.85)">
      to explore this new form of knowledge production.
    </text>

    <!-- URL -->
    <text x="0" y="520" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#10b981">
      jaigp.org
    </text>

  </g>

  <!-- Decorative accent bars -->
  <rect x="0" y="0" width="1200" height="6" fill="#10b981"/>
  <rect x="0" y="624" width="1200" height="6" fill="#10b981"/>

  <!-- Decorative circles positioned to not interfere -->
  <circle cx="950" cy="480" r="150" fill="rgba(16, 185, 129, 0.08)"/>
  <circle cx="1050" cy="150" r="100" fill="rgba(59, 130, 246, 0.1)"/>

  <!-- Small accent element -->
  <rect x="100" y="140" width="60" height="4" fill="#10b981" rx="2"/>

</svg>
