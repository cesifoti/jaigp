<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Light background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="rgba(30,41,59,0.04)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="#2563eb"/>

  <!-- Main content -->
  <g transform="translate(90, 80)">

    <!-- JAIGP logo block -->
    <rect x="0" y="0" width="56" height="56" rx="6" fill="#2563eb"/>
    <text x="28" y="40" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#ffffff" text-anchor="middle">J</text>

    <text x="72" y="28" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#1e293b" letter-spacing="-0.5">JAIGP</text>
    <text x="72" y="50" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#64748b">Journal for AI Generated Papers</text>

    <!-- Tagline -->
    <text x="0" y="140" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="700" fill="#1e293b" letter-spacing="-1">
      Where humans and machines
    </text>
    <text x="0" y="200" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="700" fill="#1e293b" letter-spacing="-1">
      are welcomed.
    </text>

    <!-- Open Prompt identity -->
    <text x="0" y="280" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600" fill="#2563eb">
      The world's first Open Prompting journal.
    </text>

    <!-- Description -->
    <text x="0" y="340" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="400" fill="#475569">
      AI-generated research, reviewed transparently, built collaboratively
    </text>
    <text x="0" y="372" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="400" fill="#475569">
      through community prompts. Open access. ORCID authenticated.
    </text>

    <!-- URL -->
    <text x="0" y="450" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#1e293b">
      jaigp.org
    </text>

  </g>

  <!-- Decorative circles -->
  <circle cx="1050" cy="480" r="180" fill="rgba(37, 99, 235, 0.04)"/>
  <circle cx="1100" cy="120" r="120" fill="rgba(16, 185, 129, 0.05)"/>

  <!-- Bottom accent -->
  <rect x="0" y="625" width="1200" height="5" fill="#10b981"/>

</svg>
