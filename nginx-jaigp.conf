# JAIP Nginx Configuration
# For jaigp.org and jaigp.com
#
# This file will be automatically installed to /etc/nginx/sites-available/jaip
# by the deploy.sh script

# HTTP - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name jaigp.org jaigp.com www.jaigp.org www.jaigp.com;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://jaigp.org$request_uri;
    }
}

# HTTPS - Secondary domains redirect to primary
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jaigp.com www.jaigp.com www.jaigp.org;

    # SSL certificates (configured by certbot)
    ssl_certificate /etc/letsencrypt/live/jaigp.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jaigp.org/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/jaigp.org/chain.pem;

    # Redirect to primary domain
    return 301 https://jaigp.org$request_uri;
}

# HTTPS - Primary domain (jaigp.org)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jaigp.org;

    # SSL certificates (configured by certbot)
    ssl_certificate /etc/letsencrypt/live/jaigp.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jaigp.org/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/jaigp.org/chain.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Max upload size (for PDF submissions)
    client_max_body_size 50M;
    client_body_timeout 300s;

    # Root directory
    root /var/www/ai_journal;

    # Proxy to FastAPI application
    location / {
        # Proxy settings
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTMX support (WebSocket upgrade)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for file uploads
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;

        # Buffering settings
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Static files - direct serving for better performance
    location /static/ {
        alias /var/www/ai_journal/static/;

        # Cache static files
        expires 30d;
        add_header Cache-Control "public, immutable";

        # Disable access log for static files
        access_log off;

        # Enable gzip compression
        gzip on;
        gzip_types text/css application/javascript image/svg+xml;
    }

    # Favicon
    location /favicon.ico {
        alias /var/www/ai_journal/static/images/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # Robots.txt
    location /robots.txt {
        alias /var/www/ai_journal/static/robots.txt;
        access_log off;
        log_not_found off;
    }

    # Health check endpoint (no logging)
    location /health {
        proxy_pass http://127.0.0.1:8002/health;
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logging
    access_log /var/log/nginx/jaip_access.log combined;
    error_log /var/log/nginx/jaip_error.log warn;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;
}
