<div class="bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-200 rounded-lg p-4 mb-4">
    <div class="flex items-start gap-3">
        <svg class="w-5 h-5 text-blue-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        <div class="flex-1 min-w-0">
            <p class="text-xs font-semibold text-blue-600 uppercase tracking-wide mb-1">AI Summary{% if count %} of {% if count == 1 %}1 {{ (label|default("item"))[:-1] if (label|default("items")).endswith("s") else label|default("item") }}{% else %}last {{ count }} {{ label|default("items") }}{% endif %}{% endif %}</p>
            <p class="text-sm text-slate-700 leading-relaxed">{{ summary }}</p>
            <p class="text-[10px] text-slate-400 mt-2">Generated by Claude Haiku 4.5</p>
        </div>
    </div>
</div>
