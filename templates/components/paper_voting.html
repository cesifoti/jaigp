{# Paper voting component - thumbs up/down #}
<div class="flex items-center gap-3 text-sm" data-paper-id="{{ paper.id }}">
    {% if user %}
    <!-- Upvote Button -->
    <button class="vote-btn flex items-center gap-1 px-2 py-1 rounded hover:bg-green-50 transition"
            data-vote-type="upvote"
            onclick="votePaper({{ paper.id }}, 'upvote', this)">
        <svg class="w-4 h-4 text-slate-400 hover:text-green-600 transition" fill="currentColor" viewBox="0 0 20 20">
            <path d="M2 10.5a1.5 1.5 0 113 0v6a1.5 1.5 0 01-3 0v-6zM6 10.333v5.43a2 2 0 001.106 1.79l.05.025A4 4 0 008.943 18h5.416a2 2 0 001.962-1.608l1.2-6A2 2 0 0015.56 8H12V4a2 2 0 00-2-2 1 1 0 00-1 1v.667a4 4 0 01-.8 2.4L6.8 7.933a4 4 0 00-.8 2.4z"></path>
        </svg>
        <span class="upvote-count text-slate-600 font-medium">{{ paper.upvote_count }}</span>
    </button>

    <!-- Downvote Button -->
    <button class="vote-btn flex items-center gap-1 px-2 py-1 rounded hover:bg-red-50 transition"
            data-vote-type="downvote"
            onclick="votePaper({{ paper.id }}, 'downvote', this)">
        <svg class="w-4 h-4 text-slate-400 hover:text-red-600 transition" fill="currentColor" viewBox="0 0 20 20">
            <path d="M18 9.5a1.5 1.5 0 11-3 0v-6a1.5 1.5 0 013 0v6zM14 9.667v-5.43a2 2 0 00-1.105-1.79l-.05-.025A4 4 0 0011.055 2H5.64a2 2 0 00-1.962 1.608l-1.2 6A2 2 0 004.44 12H8v4a2 2 0 002 2 1 1 0 001-1v-.667a4 4 0 01.8-2.4l1.4-1.866a4 4 0 00.8-2.4z"></path>
        </svg>
        <span class="downvote-count text-slate-600 font-medium">{{ paper.downvote_count }}</span>
    </button>
    {% else %}
    <!-- Not logged in - show counts only -->
    <div class="flex items-center gap-1 text-slate-500">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
            <path d="M2 10.5a1.5 1.5 0 113 0v6a1.5 1.5 0 01-3 0v-6zM6 10.333v5.43a2 2 0 001.106 1.79l.05.025A4 4 0 008.943 18h5.416a2 2 0 001.962-1.608l1.2-6A2 2 0 0015.56 8H12V4a2 2 0 00-2-2 1 1 0 00-1 1v.667a4 4 0 01-.8 2.4L6.8 7.933a4 4 0 00-.8 2.4z"></path>
        </svg>
        <span class="font-medium">{{ paper.upvote_count }}</span>
    </div>
    <div class="flex items-center gap-1 text-slate-500">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
            <path d="M18 9.5a1.5 1.5 0 11-3 0v-6a1.5 1.5 0 013 0v6zM14 9.667v-5.43a2 2 0 00-1.105-1.79l-.05-.025A4 4 0 0011.055 2H5.64a2 2 0 00-1.962 1.608l-1.2 6A2 2 0 004.44 12H8v4a2 2 0 002 2 1 1 0 001-1v-.667a4 4 0 01.8-2.4l1.4-1.866a4 4 0 00.8-2.4z"></path>
        </svg>
        <span class="font-medium">{{ paper.downvote_count }}</span>
    </div>
    {% endif %}
</div>

{% if user %}
<script>
function votePaper(paperId, voteType, button) {
    // Prevent double clicks
    if (button.disabled) return;
    button.disabled = true;

    // Create form data
    const formData = new FormData();
    formData.append('vote_type', voteType);

    // Send vote
    fetch(`/paper/${paperId}/vote`, {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            // Update vote counts
            const container = button.closest('[data-paper-id]');
            const upvoteCount = container.querySelector('.upvote-count');
            const downvoteCount = container.querySelector('.downvote-count');

            if (upvoteCount) upvoteCount.textContent = data.upvotes;
            if (downvoteCount) downvoteCount.textContent = data.downvotes;

            // Toggle button active state (visual feedback)
            const allButtons = container.querySelectorAll('.vote-btn');
            allButtons.forEach(btn => {
                const btnVoteType = btn.dataset.voteType;
                const svg = btn.querySelector('svg');
                if (btnVoteType === voteType) {
                    // Check if this was a toggle-off or toggle-on
                    const wasActive = svg.classList.contains('text-green-600') || svg.classList.contains('text-red-600');
                    if (wasActive) {
                        // Toggle off
                        svg.classList.remove('text-green-600', 'text-red-600');
                        svg.classList.add('text-slate-400');
                    } else {
                        // Toggle on
                        svg.classList.remove('text-slate-400');
                        if (voteType === 'upvote') {
                            svg.classList.add('text-green-600');
                        } else {
                            svg.classList.add('text-red-600');
                        }
                    }
                } else {
                    // Deactivate other button
                    svg.classList.remove('text-green-600', 'text-red-600');
                    svg.classList.add('text-slate-400');
                }
            });
        }
        button.disabled = false;
    })
    .catch(error => {
        console.error('Vote error:', error);
        button.disabled = false;
        alert('Failed to vote. Please try again.');
    });
}
</script>
{% endif %}
