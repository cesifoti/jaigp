<!-- Single discussion comment -->
<div class="flex gap-2 py-2 {% if is_new %}bg-green-50/30 -mx-3 px-3 rounded{% endif %}" id="dcomment-{{ comment.id }}">
    <a href="/auth/profile?user_id={{ comment.user_id }}" class="flex-shrink-0">
        <div class="w-6 h-6 rounded-full bg-primary/10 flex items-center justify-center">
            <span class="text-[10px] font-bold text-primary">{{ comment.user.name[0] }}</span>
        </div>
    </a>
    <div class="flex-1 min-w-0">
        <div class="flex items-center gap-1.5">
            <a href="/auth/profile?user_id={{ comment.user_id }}" class="text-xs font-semibold text-secondary hover:underline">{{ comment.user.name }}</a>
            <span class="text-[10px] text-slate-400">&middot; {{ comment.created_at|format_date("%b %d") }}</span>
        </div>
        <div class="text-sm sm:text-sm text-slate-600 leading-relaxed mt-0.5">{{ comment.content|format_post }}</div>
        <div class="flex items-center gap-3 mt-1 -ml-1">
            <button onclick="voteComment('discussion', {{ comment.id }}, 'upvote')"
                    class="flex items-center gap-0.5 px-1 py-0.5 rounded hover:bg-green-50 transition group" id="dcv-up-{{ comment.id }}">
                <svg class="w-3 h-3 {% if comment_votes.get(comment.id) == 'upvote' %}text-pink-500{% else %}text-slate-300 group-hover:text-pink-400{% endif %}" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
                <span class="text-[10px] {% if comment_votes.get(comment.id) == 'upvote' %}text-green-600{% else %}text-slate-400{% endif %}" id="dcv-upc-{{ comment.id }}">{{ comment.upvote_count }}</span>
            </button>
            <button onclick="voteComment('discussion', {{ comment.id }}, 'downvote')"
                    class="flex items-center gap-0.5 px-1 py-0.5 rounded hover:bg-red-50 transition group" id="dcv-down-{{ comment.id }}">
                <svg class="w-3 h-3 {% if comment_votes.get(comment.id) == 'downvote' %}text-red-500{% else %}text-slate-300 group-hover:text-red-400{% endif %}" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" opacity="0.15"/><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="8" y1="7" x2="16" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span class="text-[10px] {% if comment_votes.get(comment.id) == 'downvote' %}text-red-600{% else %}text-slate-400{% endif %}" id="dcv-downc-{{ comment.id }}">{{ comment.downvote_count }}</span>
            </button>
            {% if comment.net_votes != 0 %}
            <span class="text-[10px] font-semibold {% if comment.net_votes > 0 %}text-green-600{% else %}text-red-600{% endif %}" id="dcv-net-{{ comment.id }}">{% if comment.net_votes > 0 %}+{% endif %}{{ comment.net_votes }}</span>
            {% endif %}
        </div>
    </div>
</div>
